# sonar-project.properties
# SonarQube project configuration for Node/logging-standards

sonar.projectKey=fitness-functions-node-logging
sonar.projectName=Fitness Functions — Node Logging Standards
sonar.projectVersion=1.0

# SonarCloud — replace with your organization key
sonar.organization=your-organization-key
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.tests=tests
sonar.exclusions=src/*-bad.js,node_modules/**

# Jest LCOV coverage report
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Focus quality gate conditions on new code only
sonar.newCode.referenceBranch=main

# Block the CI pipeline until SonarQube resolves the quality gate verdict
sonar.qualitygate.wait=true

sonar.sourceEncoding=UTF-8
