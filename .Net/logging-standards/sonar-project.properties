# sonar-project.properties
# SonarQube project configuration for .Net/logging-standards

sonar.projectKey=fitness-functions-dotnet-logging
sonar.projectName=Fitness Functions — .NET Logging Standards
sonar.projectVersion=1.0

# SonarCloud — replace with your organization key
sonar.organization=YOUR_ORG_KEY
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.tests=tests

# OpenCover or Coverlet XML coverage report
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Focus quality gate conditions on new code only
sonar.newCode.referenceBranch=main

# Block the CI pipeline until SonarQube resolves the quality gate verdict
sonar.qualitygate.wait=true

sonar.sourceEncoding=UTF-8
