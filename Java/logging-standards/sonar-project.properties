# sonar-project.properties
# SonarQube project configuration for Java/logging-standards

sonar.projectKey=fitness-functions-java-logging
sonar.projectName=Fitness Functions — Java Logging Standards
sonar.projectVersion=1.0

# SonarCloud — replace with your organization key
sonar.organization=YOUR_ORG_KEY
sonar.host.url=https://sonarcloud.io

sonar.sources=src/main/java
sonar.tests=src/test/java

# JaCoCo coverage report (generated by Maven/Gradle)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Focus quality gate conditions on new code only
sonar.newCode.referenceBranch=main

# Block the CI pipeline until SonarQube resolves the quality gate verdict
sonar.qualitygate.wait=true

sonar.sourceEncoding=UTF-8
sonar.java.source=17
