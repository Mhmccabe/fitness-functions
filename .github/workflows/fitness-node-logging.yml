name: Fitness Functions — Node Logging Standards

on:
  push:
    branches: [main]
    paths:
      - 'Node/logging-standards/**'
  pull_request:
    branches: [main]
    paths:
      - 'Node/logging-standards/**'
  schedule:
    # Weekly full scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

defaults:
  run:
    working-directory: Node/logging-standards

jobs:
  fitness-functions:
    name: Logging Standards Fitness Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Node/logging-standards/package.json

      - name: Install dependencies
        run: npm install

      - name: Install semgrep
        run: pip install semgrep

      # ── Layer 1: Semgrep — Logging observability standards ─────────────────
      - name: Semgrep — logging rules
        run: |
          semgrep \
            --config .semgrep/logging-rules.yml \
            src/ \
            --exclude="*-bad.js" \
            --json \
            --output semgrep-results.json \
            --quiet
          VIOLATIONS=$(python3 -c "
          import json, sys
          data = json.load(open('semgrep-results.json'))
          count = len(data.get('results', []))
          print(count)
          sys.exit(1 if count > 0 else 0)
          ")

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results-node
          path: Node/logging-standards/semgrep-results.json

      # ── Layer 2: Tests with coverage ───────────────────────────────────────
      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node
          path: Node/logging-standards/coverage/lcov.info

      # ── Layer 3: SonarQube static analysis ────────────────────────────────
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v3
        with:
          projectBaseDir: Node/logging-standards
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ── Layer 4: GitHub Actions job summary ───────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          VIOLATIONS=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('semgrep-results.json'))
              print(len(data.get('results', [])))
          except Exception:
              print('N/A')
          ")

          if [ "$VIOLATIONS" = "0" ]; then
            VIOLATIONS_STATUS="✅ 0"
          else
            VIOLATIONS_STATUS="❌ $VIOLATIONS"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Fitness Function — Node Logging Standards

          | Check | Result |
          |---|---|
          | Logging violations (semgrep) | ${VIOLATIONS_STATUS} |

          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
