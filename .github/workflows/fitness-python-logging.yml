name: Fitness Functions — Python Logging Standards

on:
  push:
    branches: [main]
    paths:
      - 'Python/logging-standards/**'
  pull_request:
    branches: [main]
    paths:
      - 'Python/logging-standards/**'
  schedule:
    # Weekly full scan every Monday at 06:00 UTC
    # Builds SonarQube trend history even during quiet periods
    - cron: '0 6 * * 1'
  workflow_dispatch:

defaults:
  run:
    working-directory: Python/logging-standards

permissions:
  contents: read
  security-events: write

jobs:
  fitness-functions:
    name: Logging Standards Fitness Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed for SonarQube "new code" detection
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      # ── Layer 1: Semgrep — Logging observability standards ─────────────────
      - name: Semgrep — logging rules
        run: |
          semgrep \
            --config .semgrep/logging-rules.yml \
            src/ \
            --json \
            --output semgrep-results.json \
            --quiet
          VIOLATIONS=$(python3 -c "
          import json, sys
          data = json.load(open('semgrep-results.json'))
          count = len(data.get('results', []))
          print(count)
          sys.exit(0)
          ")
        # Violations are warnings — build continues, summary shows the count
        continue-on-error: true

      - name: Convert Semgrep results to SARIF
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json, datetime

          try:
              data = json.load(open('semgrep-results.json'))
              results = data.get('results', [])
          except Exception:
              results = []

          runs = [{
              "tool": {
                  "driver": {
                      "name": "Semgrep",
                      "informationUri": "https://semgrep.dev",
                      "rules": []
                  }
              },
              "results": []
          }]

          rule_ids = {}
          for r in results:
              rule_id = r.get('check_id', 'unknown')
              msg = r.get('extra', {}).get('message', '').splitlines()[0]
              if rule_id not in rule_ids:
                  rule_ids[rule_id] = len(rule_ids)
                  runs[0]['tool']['driver']['rules'].append({
                      "id": rule_id,
                      "shortDescription": {"text": msg},
                      "helpUri": "https://semgrep.dev"
                  })
              runs[0]['results'].append({
                  "ruleId": rule_id,
                  "message": {"text": msg},
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": r.get('path', '')},
                          "region": {
                              "startLine": r.get('start', {}).get('line', 1),
                              "startColumn": r.get('start', {}).get('col', 1)
                          }
                      }
                  }],
                  "level": "warning"
              })

          sarif = {"version": "2.1.0", "$schema": "https://json.schemastore.org/sarif-2.1.0.json", "runs": runs}
          with open('semgrep.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          PYEOF

      - name: Upload Semgrep SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: Python/logging-standards/semgrep.sarif
          category: semgrep-python-logging

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: Python/logging-standards/semgrep-results.json

      # ── Layer 2: Tests with coverage ───────────────────────────────────────
      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Python/logging-standards/coverage.xml

      # ── Layer 3: SonarQube static analysis ────────────────────────────────
      - name: SonarQube scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v3
        with:
          projectBaseDir: Python/logging-standards
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ── Layer 4: Push custom metrics ──────────────────────────────────────
      # Runs after sonar-scanner so the analysis already exists on the server.
      # Violation count and coverage are stored as custom measures and can
      # be gated on and trended over time.
      - name: Push logging metrics to SonarQube
        continue-on-error: true
        env:
          SONAR_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: fitness-functions-python-logging
        run: python3 scripts/push_logging_metrics.py

      # ── Layer 5: Quality gate verdict ─────────────────────────────────────
      - name: Check quality gate
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ── Layer 6: GitHub Actions job summary ───────────────────────────────
      # Writes a markdown summary visible on the Actions run page under
      # the "Summary" tab — no extra infrastructure required.
      - name: Write job summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json, xml.etree.ElementTree as ET

          # --- violations ---
          try:
              data = json.load(open('semgrep-results.json'))
              results = data.get('results', [])
              violation_count = len(results)
          except Exception:
              results = []
              violation_count = 'N/A'

          # --- coverage ---
          try:
              rate = float(ET.parse('coverage.xml').getroot().get('line-rate', 0)) * 100
              coverage = f'{rate:.1f}'
              coverage_ok = rate >= 80
          except Exception:
              coverage = 'N/A'
              coverage_ok = False

          v_icon = '✅' if violation_count == 0 else '⚠️'
          c_icon = '✅' if coverage_ok else '❌'

          lines = []
          lines.append('## Fitness Function — Python Logging Standards\n')
          lines.append('| Check | Result |')
          lines.append('|---|---|')
          lines.append(f'| Logging violations (semgrep) | {v_icon} {violation_count} |')
          lines.append(f'| Test coverage | {c_icon} {coverage}% |')
          lines.append('')

          if results:
              lines.append('### ⚠️ Violations\n')
              lines.append('| File | Line | Rule | Message |')
              lines.append('|---|---|---|---|')
              for r in results:
                  path = r.get('path', '')
                  line = r.get('start', {}).get('line', '')
                  rule = r.get('check_id', '').split('.')[-1]
                  msg  = r.get('extra', {}).get('message', '').splitlines()[0][:120]
                  lines.append(f'| `{path}` | {line} | `{rule}` | {msg} |')
              lines.append('')

          lines.append(f'**Commit:** `${{ github.sha }}`  ')
          lines.append(f'**Branch:** `${{ github.ref_name }}`  ')
          lines.append(f'**Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})')

          with open('$GITHUB_STEP_SUMMARY', 'a') as f:
              f.write('\n'.join(lines) + '\n')
          PYEOF
