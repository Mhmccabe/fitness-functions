# sonar-project.properties
# SonarQube project configuration for Python/logging-standards

sonar.projectKey=fitness-functions-python-logging
sonar.projectName=Fitness Functions — Python Logging Standards
sonar.projectVersion=1.0

# SonarCloud — replace with your organization key
sonar.organization=your-organization-key
sonar.host.url=https://sonarcloud.io

# Source and test roots
sonar.sources=src
sonar.tests=tests

# Python coverage report (generated by pytest --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

# Focus quality gate conditions on new code only.
# Existing code is not blocked — only new contributions must meet the standard.
sonar.newCode.referenceBranch=main

# Block the CI pipeline until SonarQube resolves the quality gate verdict.
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8

# Exclude test files from production code analysis
sonar.exclusions=tests/**/*

# Include test files in test analysis
sonar.test.inclusions=tests/**/*
